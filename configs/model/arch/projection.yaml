# @package model

# Architecture: Linear Projection Fusion
fusion_module:
  _target_: src.models.components.linear_fusion.LinearProjectionFusion
  d_model: ${model.backbone.d_model}
  modalities: ["atac"] # Explicitly listed to ensure correct initialization
  add_separator: true
  project_after_concat: false

# Modality Encoders
modality_encoders:
  atac:
    _target_: src.models.components.modality_encoders.LatentPeakEncoder
    n_peaks: 116490  # Must match data
    n_latents: 128
    d_model: ${model.backbone.d_model}
  
