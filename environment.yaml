name: scmma
channels:
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - lightning>=2.0
  - hydra-core>=1.3
  - scanpy>=1.9
  - anndata>=0.10
  - muon
  - pysam  # Binary dependency for scglue
  - pybedtools # Binary dependency for scglue
  - scib # Benchmark tools
  - einops
  - rich
  - tqdm
  - numpy
  - scipy
  - pandas
  - openpyxl # For Excel logging support (optional but good to have)
  - scikit-learn
  - transformers>=4.30 # For Geneformer
  - ipykernel # For Notebook execution
  - pip
  - pip:
    # Core DL
    - torch 
    - torchvision
    - torch-geometric
    - torch-scatter
    - torch-sparse
    - peft
    - pynvml # For GPU monitoring in code
    
    # Manual Install Instructions for Cloud:
    # 1. scGPT: pip install git+https://github.com/bowang-lab/scGPT.git
    # 2. SCMMIB: pip install scmmib (or git clone if pypi fails)
    # - scmmib 
    
    # Install current package
    - -e .
